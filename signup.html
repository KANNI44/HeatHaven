<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heat Haven - Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@300;400;500;600;700&display=swap');

    :root {
      --primary: #000000;
      --secondary: #ffffff;
      --accent: #ff4500;
      --light: #f8f8f8;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--primary);
      background-color: #000000;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, .brand {
      font-family: 'Archivo Black', sans-serif;
      letter-spacing: -0.5px;
    }

    /* Spring hover effect */
    .spring-card {
      transition:
        transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        box-shadow 0.25s ease,
        background-color 0.25s ease,
        border-color 0.25s ease;
      box-shadow: 0 0 0 rgba(0, 0, 0, 0.25);
      will-change: transform, box-shadow;
    }

    .spring-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.45);
    }

    /* Page-load rise */
    .rise-enter {
      animation: riseEnter 0.5s ease-out forwards;
    }

    @keyframes riseEnter {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Click rise */
    .rise-click {
      animation: riseUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes riseUp {
      0% { transform: translateY(0) scale(1); }
      40% { transform: translateY(-10px) scale(1.01); }
      100% { transform: translateY(0) scale(1); }
    }
  </style>
</head>

<body class="h-screen overflow-hidden bg-black text-white">

  <!-- Navigation -->
  <nav class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <div class="brand text-2xl font-bold">
            <a href="index.html" class="text-black">HEAT HAVEN</a>
          </div> 
          <div class="hidden md:flex items-center ml-10 space-x-8">
            <a href="index.html" class="nav-link text-black hover:text-gray-600 px-2">Home</a>
            <a href="product.html" class="nav-link text-black hover:text-gray-600 px-2">Products</a>
            <a href="deals.html" class="nav-link text-black hover:text-gray-600 px-2">Hot Deals</a>
            <a href="owners.html" class="nav-link text-black hover:text-gray-600 px-2">Owners</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN — identical grid structure to login page -->
  <div class="grid grid-cols-1 lg:grid-cols-2 h-[calc(100vh-4rem)]">

    <!-- LEFT IMAGE CARD (same as login) -->
    <div class="relative hidden lg:flex items-end p-14 overflow-hidden">
      <img
        src="images/heat haven lgog new.png"
        class="absolute inset-0 w-full h-full object-cover translate-x-4 scale-100"
      />
      <div class="absolute inset-0 bg-black/50"></div>

      <div
        id="heroCard"
        class="spring-card rise-enter relative z-10 -translate-y-10 px-6 py-4 rounded-2xl bg-black/40 border border-white/10"
      >
        <h1 class="text-5xl font-bold mb-3">HEAT HAVEN 🔥</h1>
        <p class="text-gray-200">Discover the Hottest Sneakers in the Game.</p>
      </div>
    </div>

    <!-- SIGN UP CARD — same flex centering as login -->
    <div class="flex items-center justify-center px-6">
      <div
        id="signupCard"
        class="spring-card rise-enter bg-white text-black w-full max-w-md rounded-2xl p-8 shadow-2xl"
      >
        <h2 class="text-2xl font-bold mb-1">Join Heat Haven 🔥</h2>
        <p class="text-gray-500 mb-6">Create your account to access exclusive sneaker drops.</p>

        <form id="signupForm" class="space-y-4">

          <input
            type="text"
            placeholder="Full Name"
            required
            class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-red-500"
          />

          <input
            type="email"
            placeholder="Email Address"
            required
            class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-red-500"
          />

          <input
            type="password"
            id="password"
            placeholder="Password"
            required
            class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-red-500"
          />

          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            required
            class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-red-500"
          />

          <label class="flex items-center text-sm text-gray-600">
            <input type="checkbox" required class="mr-2">
            I agree to the Terms &amp; Privacy Policy
          </label>

          <button
            type="submit"
            class="spring-card w-full bg-red-600 text-white py-3 rounded-lg font-semibold hover:bg-red-700"
          >
            Create Account
          </button>

          <div class="flex items-center gap-3 my-4">
            <div class="h-px bg-gray-300 flex-1"></div>
            <span class="text-gray-400 text-sm">OR</span>
            <div class="h-px bg-gray-300 flex-1"></div>
          </div>

          <button
            type="button"
            onclick="signupWithGoogle()"
            class="spring-card w-full border py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-100"
          >
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5">
            Sign up with Google
          </button>

          <button
            type="button"
            onclick="signupWithApple()"
            class="spring-card w-full bg-black text-white py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-900"
          >
            <img src="images/apple.png" class="w-5 invert">
            Sign up with Apple
          </button>

        </form>

        <p class="text-center text-sm mt-6">
          Already have an account?
          <a href="profile login.html" class="text-red-600 font-semibold hover:underline">Log in</a>
        </p>
      </div>
    </div>

  </div>

  <script>
    const form = document.getElementById("signupForm");
    const signupCard = document.getElementById("signupCard");
    const heroCard = document.getElementById("heroCard");

    function triggerRise(card) {
      if (!card) return;
      card.classList.remove("rise-click");
      void card.offsetWidth;
      card.classList.add("rise-click");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      triggerRise(signupCard);
      triggerRise(heroCard);

      const name = form.querySelector("input[type='text']").value;
      const email = form.querySelector("input[type='email']").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
      }

      try {
        const res = await fetch("http://localhost:5000/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.message || "Registration failed");
          return;
        }
        localStorage.setItem("hh_token", data.token);
        localStorage.setItem("hh_user", JSON.stringify(data.user));
        window.location.href = "profile.html";
      } catch {
        alert("Server not reachable");
      }
    });

    function signupWithGoogle() {
      triggerRise(signupCard);
      triggerRise(heroCard);
      window.location.href = "http://localhost:5000/api/auth/google";
    }

    function signupWithApple() {
      triggerRise(signupCard);
      triggerRise(heroCard);
      window.location.href = "http://localhost:5000/api/auth/apple";
    }
  </script>
</body>
</html>
