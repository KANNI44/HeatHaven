<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heat Haven - Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { amoled:'#000000', cardDark:'#0a0a0a', hoverDark:'#111111' } } }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root { --primary:#000; --accent:#ff4500; }
    body {
      font-family: "Poppins", sans-serif;
      overflow-x: hidden;
      background-image: url("images/scape.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    h1,h2,h3,h4,.brand { font-family:"Archivo Black",sans-serif; letter-spacing:-0.5px; }
    .mobile-menu { transform:translateX(100%); transition:transform 0.3s ease-in-out; }
    .mobile-menu.open { transform:translateX(0); }

    /* ══════════════════════════════════════════════
       ALL ANIMATIONS FROM INDEX.HTML
    ══════════════════════════════════════════════ */

    /* ── Nav drop-in ── */
    @keyframes nav-drop { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
    nav { animation:nav-drop 0.6s cubic-bezier(0.16,1,0.3,1) both; }

    /* ── Brand shimmer ── */
    @keyframes brand-shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    .brand a {
      background:linear-gradient(90deg, currentColor 40%, #ff4500 50%, currentColor 60%);
      background-size:200% auto;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      animation:brand-shimmer 3.5s ease 0.5s 1 forwards;
    }

    /* ── Nav link underline hover ── */
    .nav-link { position:relative; }
    .nav-link::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:2px; background:#ff4500; border-radius:2px; transition:width 0.3s cubic-bezier(0.4,0,0.2,1); }
    .nav-link:hover::after { width:100%; }

    /* ── Page fadeIn ── */
    .page-transition { animation:fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* ── Hero word entrance ── */
    @keyframes hero-word-in { from{opacity:0;transform:translateY(40px) skewY(3deg);filter:blur(4px)} to{opacity:1;transform:translateY(0) skewY(0);filter:blur(0)} }
    .hero-title-word { display:inline-block; animation:hero-word-in 0.8s cubic-bezier(0.16,1,0.3,1) both; }
    .hero-title-word:nth-child(1){animation-delay:0.1s}
    .hero-title-word:nth-child(2){animation-delay:0.22s}
    .hero-title-word:nth-child(3){animation-delay:0.34s}

    /* ── Hero sub fade-up ── */
    @keyframes hero-sub-in { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .hero-sub { animation:hero-sub-in 0.7s ease 0.5s both; }

    /* ── Accent line grow ── */
    @keyframes line-grow { from{width:0} to{width:72px} }
    .hero-accent-line { display:block; height:3px; background:#ff4500; border-radius:2px; margin:10px 0 0; animation:line-grow 0.6s ease 0.75s both; }

    /* ── Scroll reveal ── */
    .reveal       { opacity:0; transform:translateY(28px); transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1),transform 0.7s cubic-bezier(0.16,1,0.3,1); }
    .reveal.visible { opacity:1; transform:translateY(0); }
    .reveal-left  { opacity:0; transform:translateX(-38px); transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1),transform 0.7s cubic-bezier(0.16,1,0.3,1); }
    .reveal-right { opacity:0; transform:translateX(38px);  transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1),transform 0.7s cubic-bezier(0.16,1,0.3,1); }
    .reveal-left.visible,.reveal-right.visible { opacity:1; transform:translateX(0); }

    /* ── Section heading animated underline ── */
    .section-heading { position:relative; display:inline-block; }
    .section-heading::after { content:''; position:absolute; bottom:-5px; left:0; width:0; height:3px; background:#ff4500; border-radius:2px; transition:width 0.5s cubic-bezier(0.4,0,0.2,1) 0.1s; }
    .section-heading.visible::after { width:100%; }

    /* ── Spring card (same as shoe-card hover: lift + shimmer) ── */
    .spring-card {
      transition:transform 0.25s cubic-bezier(0.175,0.885,0.32,1.275),
                 box-shadow 0.25s ease, border-color 0.25s ease;
      will-change:transform, box-shadow;
      position:relative; overflow:hidden;
    }
    .spring-card::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.16) 50%, transparent 60%);
      transform:translateX(-100%); transition:transform 0.5s ease;
      pointer-events:none; z-index:5;
    }
    .spring-card:hover::after { transform:translateX(100%); }
    .spring-card:hover { transform:translateY(-5px) scale(1.02); box-shadow:0 18px 36px rgba(0,0,0,0.28); }

    /* ── Profile card stagger entrance ── */
    @keyframes card-in { from{opacity:0;transform:translateY(24px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    .profile-card-enter { animation:card-in 0.6s cubic-bezier(0.16,1,0.3,1) both; }

    /* ── Avatar entrance ── */
    @keyframes avatar-pop { 0%{transform:scale(0.4) rotate(-8deg);opacity:0} 70%{transform:scale(1.08) rotate(2deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
    .avatar-pop { animation:avatar-pop 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s both; }

    /* ── Stats counter fade-up ── */
    @keyframes stat-in { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .stat-item { animation:stat-in 0.5s ease both; }
    .stat-item:nth-child(1){animation-delay:0.55s}
    .stat-item:nth-child(2){animation-delay:0.68s}
    .stat-item:nth-child(3){animation-delay:0.81s}

    /* ── Sidebar menu item stagger ── */
    @keyframes menu-in { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
    .menu-item { animation:menu-in 0.45s cubic-bezier(0.16,1,0.3,1) both; }
    .menu-item:nth-child(1){animation-delay:0.3s}
    .menu-item:nth-child(2){animation-delay:0.38s}
    .menu-item:nth-child(3){animation-delay:0.46s}
    .menu-item:nth-child(4){animation-delay:0.54s}
    .menu-item:nth-child(5){animation-delay:0.62s}

    /* ── Input field focus ring ── */
    .profile-input {
      width:100%; margin-top:8px; padding:10px 14px;
      border:1.5px solid rgba(255,255,255,0.35); border-radius:10px;
      background:rgba(255,255,255,0.85); color:#111;
      font-family:"Poppins",sans-serif; font-size:14px;
      outline:none;
      transition:border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .profile-input:focus {
      border-color:#ff4500;
      box-shadow:0 0 0 3px rgba(255,69,0,0.18);
      transform:translateY(-1px);
    }

    /* ── Save button ripple ── */
    .save-btn {
      position:relative; overflow:hidden;
      transition:transform 0.2s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.2s;
      box-shadow:0 4px 16px rgba(220,38,38,0.4);
    }
    .save-btn::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,0.22); border-radius:inherit; transform:scale(0); opacity:0; transition:transform 0.35s ease,opacity 0.35s ease; }
    .save-btn:active::after { transform:scale(2.5); opacity:0; transition:0s; }
    .save-btn:hover { transform:translateY(-2px) scale(1.03); box-shadow:0 8px 24px rgba(220,38,38,0.55); }
    .save-btn:active { transform:scale(0.97); }

    /* ── Logout button pulse ── */
    @keyframes logout-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.35)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
    .logout-btn { animation:logout-pulse 2.5s ease-in-out infinite; }
    .logout-btn:hover { animation:none; transform:translateY(-3px) scale(1.03); box-shadow:0 8px 24px rgba(239,68,68,0.5) !important; }

    /* ── Cursor glow ── */
    #cursor-glow { position:fixed; width:320px; height:320px; border-radius:50%; background:radial-gradient(circle,rgba(255,69,0,0.07) 0%,transparent 70%); pointer-events:none; z-index:0; transform:translate(-50%,-50%); transition:opacity 0.4s ease; opacity:0; }
    body:hover #cursor-glow { opacity:1; }

    /* ── Theme toggle (same animated sun/moon as index) ── */
    #theme-toggle .sun-icon,
    #theme-toggle .moon-icon { position:absolute; width:1.4rem; height:1.4rem; transition:transform 0.4s ease,opacity 0.4s ease; }
    #theme-toggle .sun-icon  { opacity:1; transform:rotate(0deg) scale(1); }
    #theme-toggle .moon-icon { opacity:0; transform:rotate(90deg) scale(0.4); }
    .dark #theme-toggle .sun-icon  { opacity:0; transform:rotate(-90deg) scale(0.4); }
    .dark #theme-toggle .moon-icon { opacity:1; transform:rotate(0deg) scale(1); }

    /* ── Toast (same as index) ── */
    #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#111827; color:#fff; padding:.75rem 1.5rem; border-radius:9999px; font-size:.875rem; display:none; align-items:center; gap:.5rem; z-index:9999; }
    #toast.show { display:flex; animation:toast-fade 2.2s ease-out forwards; }
    @keyframes toast-fade { 0%{opacity:0;transform:translate(-50%,10px)} 10%,85%{opacity:1;transform:translate(-50%,0)} 100%{opacity:0;transform:translate(-50%,10px)} }

    /* ── Search pill (gradient-border, same as index) ── */
    .nav-search-pill { display:flex; align-items:center; min-width:190px; padding:0; border-radius:999px; border:none; cursor:pointer; background:transparent; font-family:"Poppins",sans-serif; font-size:13px; font-weight:500; transition:transform 0.15s; position:relative; white-space:nowrap; }
    .nav-search-pill:hover { transform:scale(1.02); }
    .nav-search-pill:active { transform:scale(0.97); }
    .nav-search-pill .pill-border { position:absolute; inset:0; border-radius:999px; padding:2px; background:linear-gradient(100deg,#4285f4,#ea4335,#fbbc04,#34a853,#4285f4); background-size:250% 250%; animation:pill-gradient 3s ease infinite; -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
    .nav-search-pill .pill-inner { display:flex; align-items:center; gap:10px; width:100%; padding:8px 18px 8px 14px; border-radius:999px; background:#f8f9fa; position:relative; z-index:1; transition:background 0.2s,box-shadow 0.2s; }
    .nav-search-pill:hover .pill-inner { background:#fff; box-shadow:0 2px 16px rgba(66,133,244,0.18),0 1px 6px rgba(234,67,53,0.1); }
    .pill-search-icon { width:28px; height:28px; flex-shrink:0; background:linear-gradient(135deg,#4285f4,#34a853); border-radius:50%; display:flex; align-items:center; justify-content:center; transition:transform 0.2s; }
    .nav-search-pill:hover .pill-search-icon { transform:rotate(-10deg) scale(1.1); }
    .pill-search-icon svg { width:13px; height:13px; }
    .pill-label { flex:1; text-align:left; color:#5f6368; font-size:13px; }
    .pill-kbd { display:inline-flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.07); border-radius:6px; padding:2px 7px; font-size:11px; font-family:monospace; color:#999; line-height:1.5; flex-shrink:0; }
    .dark .nav-search-pill .pill-inner { background:#1a1a1a; }
    .dark .nav-search-pill:hover .pill-inner { background:#222; box-shadow:0 2px 16px rgba(66,133,244,0.12); }
    .dark .pill-label { color:#9aa0a6; }
    .dark .pill-kbd { background:rgba(255,255,255,0.07); color:#666; }
    @keyframes pill-gradient { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    /* ── Search overlay (same as index) ── */
    #search-overlay { position:fixed; inset:0; z-index:9998; background:rgba(255,255,255,0.85); backdrop-filter:blur(20px); display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding-top:120px; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
    .dark #search-overlay { background:rgba(0,0,0,0.88); }
    #search-overlay.open { opacity:1; pointer-events:all; }
    #search-box-wrap { width:100%; max-width:620px; padding:0 20px; position:relative; }
    .search-border-wrap { position:relative; border-radius:999px; padding:3px; background:linear-gradient(135deg,#4285f4,#ea4335,#fbbc04,#34a853,#4285f4); background-size:300% 300%; animation:gradient-shift 4s ease infinite; box-shadow:0 8px 40px rgba(66,133,244,0.25),0 4px 20px rgba(234,67,53,0.15); }
    @keyframes gradient-shift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .search-inner { display:flex; align-items:center; background:#fff; border-radius:999px; padding:14px 20px 14px 22px; gap:14px; }
    .dark .search-inner { background:#111; }
    .search-icon-wrap { color:#5f6368; flex-shrink:0; font-size:18px; display:flex; align-items:center; }
    .dark .search-icon-wrap { color:#9aa0a6; }
    #search-input { flex:1; border:none; outline:none; background:transparent; font-family:"Poppins",sans-serif; font-size:18px; color:#202124; letter-spacing:0.01em; }
    .dark #search-input { color:#e8eaed; }
    #search-input::placeholder { color:#9aa0a6; }
    #search-clear-btn { background:none; border:none; cursor:pointer; color:#9aa0a6; font-size:16px; display:none; padding:4px; border-radius:50%; transition:color 0.15s,background 0.15s; flex-shrink:0; }
    #search-clear-btn:hover { background:#f1f3f4; color:#5f6368; }
    .dark #search-clear-btn:hover { background:#303134; }
    #search-clear-btn.visible { display:flex; align-items:center; justify-content:center; }
    #search-results-panel { width:100%; max-width:620px; padding:0 20px; margin-top:16px; max-height:calc(100vh - 280px); overflow-y:auto; display:none; }
    #search-results-panel.has-results { display:block; }
    #search-results-panel::-webkit-scrollbar { width:4px; }
    #search-results-panel::-webkit-scrollbar-thumb { background:#ccc; border-radius:2px; }
    .dark #search-results-panel::-webkit-scrollbar-thumb { background:#444; }
    .search-result-item { display:flex; align-items:center; gap:14px; padding:12px 18px; background:#fff; border-radius:14px; margin-bottom:8px; cursor:pointer; transition:background 0.15s,transform 0.15s,box-shadow 0.15s; animation:result-in 0.2s ease; box-shadow:0 1px 6px rgba(0,0,0,0.08); }
    @keyframes result-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .dark .search-result-item { background:#1c1c1e; box-shadow:none; }
    .search-result-item:hover { background:#f8f9fa; transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,0.1); }
    .dark .search-result-item:hover { background:#2c2c2e; }
    .sri-img { width:52px; height:52px; object-fit:contain; border-radius:10px; flex-shrink:0; background:#f1f3f4; }
    .dark .sri-img { background:#2c2c2e; }
    .sri-info { flex:1; min-width:0; }
    .sri-name { font-weight:600; font-size:14px; color:#202124; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dark .sri-name { color:#e8eaed; }
    .sri-sub { font-size:12px; color:#5f6368; margin-top:2px; }
    .dark .sri-sub { color:#9aa0a6; }
    .sri-price { font-weight:700; font-size:14px; color:#202124; flex-shrink:0; }
    .dark .sri-price { color:#e8eaed; }
    .search-no-results { text-align:center; padding:40px 16px; background:#fff; border-radius:14px; font-size:14px; color:#5f6368; box-shadow:0 1px 6px rgba(0,0,0,0.08); }
    .dark .search-no-results { background:#1c1c1e; color:#9aa0a6; box-shadow:none; }
    .search-no-results .emoji { font-size:36px; display:block; margin-bottom:10px; }
    .search-highlight { color:#1a73e8; font-weight:700; }
    .dark .search-highlight { color:#8ab4f8; }
    #search-close-hint { margin-top:16px; font-size:12px; color:#9aa0a6; font-family:"Poppins",sans-serif; }
    #search-close-hint kbd { background:rgba(0,0,0,0.08); color:#5f6368; padding:2px 8px; border-radius:4px; font-family:monospace; }
    .dark #search-close-hint kbd { background:rgba(255,255,255,0.1); color:#9aa0a6; }

    /* ── Cart badge bump ── */
    @keyframes cart-bump { 0%{transform:scale(1)} 40%{transform:scale(1.5)} 70%{transform:scale(0.85)} 100%{transform:scale(1)} }
    .cart-bump { animation:cart-bump 0.35s ease-out; }
  </style>
</head>

<body class="text-black transition-colors duration-300">

<!-- Cursor Glow (from index) -->
<div id="cursor-glow"></div>

<!-- SEARCH OVERLAY (same as index) -->
<div id="search-overlay" role="dialog" aria-label="Search products">
  <div id="search-box-wrap">
    <div class="search-border-wrap">
      <div class="search-inner">
        <div class="search-icon-wrap"><i class="fas fa-search"></i></div>
        <input id="search-input" type="text" placeholder="Search sneakers, brands, colorways…" autocomplete="off" aria-label="Search" />
        <button id="search-clear-btn" aria-label="Clear search">✕</button>
      </div>
    </div>
  </div>
  <div id="search-results-panel" role="listbox"></div>
  <p id="search-close-hint">Press <kbd>Esc</kbd> to close</p>
</div>

<!-- Dark Mode Toggle (animated sun/moon from index) -->
<div class="fixed bottom-10 right-6 z-50">
  <button id="theme-toggle"
    class="relative flex items-center justify-center w-12 h-12 rounded-full shadow-xl bg-gray-200 dark:bg-cardDark transition-all duration-300 hover:scale-110"
    aria-label="Toggle dark mode">
    <svg class="sun-icon text-yellow-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>
      <path stroke-linecap="round" d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="moon-icon text-yellow-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
    </svg>
  </button>
</div>

            <i class="fas fa-user text-black dark:text-white"></i>
          </a>
          <a href="profile login.html" class="ml-2 px-4 py-1.5 rounded-full text-sm font-medium border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition">Login</a>

<!-- Toast -->
<div id="toast">
  <i class="fas fa-check-circle" style="color:#22c55e"></i>
  <span></span>
</div>

<script>
// ── DARK MODE ─────────────────────────────────────────────
if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
document.getElementById("theme-toggle").addEventListener("click", () => {
  const d = document.documentElement.classList.toggle("dark");
  localStorage.setItem("theme", d ? "dark" : "light");
});

// ── MOBILE MENU ───────────────────────────────────────────
document.getElementById("mobile-menu-button").addEventListener("click", () => document.getElementById("mobile-menu").classList.add("open"));
document.getElementById("close-menu").addEventListener("click", () => document.getElementById("mobile-menu").classList.remove("open"));

// ── CURSOR GLOW (from index) ──────────────────────────────
const glow = document.getElementById('cursor-glow');
document.addEventListener('mousemove', e => { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });

// ── HELPERS ───────────────────────────────────────────────
function escH(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

function showToast(msg, isError) {
  const t = document.getElementById("toast");
  t.querySelector("i").className = isError ? "fas fa-exclamation-circle" : "fas fa-check-circle";
  t.querySelector("i").style.color = isError ? "#facc15" : "#22c55e";
  t.querySelector("span").textContent = msg;
  t.classList.remove("show"); void t.offsetWidth; t.classList.add("show");
}

// ── CART BADGE ────────────────────────────────────────────
function getCart() { try { return JSON.parse(localStorage.getItem("hh_cart") || "[]"); } catch(e) { return []; } }
function updateCartBadge() {
  const t = getCart().reduce((s, i) => s + (i.qty || 0), 0);
  document.querySelectorAll("#cart-count,#cart-count-mobile").forEach(el => el.textContent = t);
}
updateCartBadge();

// ── WISHLIST COUNT ────────────────────────────────────────
function getWishlist() { try { return JSON.parse(localStorage.getItem("hh_wishlist") || "[]"); } catch(e) { return []; } }
const wcEl = document.getElementById("wishlist-count");
if (wcEl) wcEl.textContent = getWishlist().length;

// ── INTERSECTION OBSERVER (scroll reveals — same as index) ─
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
document.querySelectorAll('.reveal,.reveal-left,.reveal-right,.section-heading').forEach(el => io.observe(el));

// ── 3D TILT on details card (same as deal-card on index) ──
const detailCard = document.querySelector('.reveal-right.spring-card');
if (detailCard) {
  detailCard.addEventListener('mousemove', e => {
    const r = detailCard.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width  - 0.5;
    const y = (e.clientY - r.top)  / r.height - 0.5;
    detailCard.style.transform = `perspective(900px) rotateX(${-y * 6}deg) rotateY(${x * 6}deg) translateY(-4px) scale(1.01)`;
  });
  detailCard.addEventListener('mouseleave', () => { detailCard.style.transform = ''; });
}

// ── NAV HIGHLIGHT (same as index) ─────────────────────────
const currentPage = location.pathname.split('/').pop() || 'profile.html';
document.querySelectorAll('.nav-link').forEach(link => {
  if (link.getAttribute('href') === currentPage) { link.classList.add('font-semibold'); link.style.color = '#ff4500'; }
});

// ── SEARCH (same as index) ────────────────────────────────
const PRODUCT_INDEX = [
  { name:'Air Jordan 1 Retro High',    colorway:'Chicago Bulls',   brand:'Jordan',      price:5559, img:'images/aj 1 chichgo.png' },
  { name:'Nike Uptempo Slide',         colorway:'Chicago Bulls',   brand:'Nike',        price:5559, img:'images/uptempo slide bulls.png' },
  { name:'Nike SB Dunk Low',           colorway:'Gulf',            brand:'Nike',        price:5559, img:'images/sb gulf.png' },
  { name:'Adidas Campus',             colorway:'Clear Sky Gum',   brand:'Adidas',      price:5559, img:'images/adidas campus clear sky gum.png' },
  { name:'Air Force 1 Low',           colorway:'Lakers Home',     brand:'Nike',        price:5559, img:'images/af1 kobe yellow.png' },
  { name:'Yeezy Boost 350 V2',        colorway:'Zebra',           brand:'Yeezy',       price:5559, img:'images/yeezy zebra.png' },
  { name:'Yeezy 700 V3',              colorway:'Azael',           brand:'Yeezy',       price:5559, img:'images/yzy 700 v3 azael.png' },
  { name:'Rick Owens Hollywood High', colorway:'Black Milk',      brand:'Rick Owens',  price:5559, img:'images/rick owens hollywood high black milk.png' },
  { name:'Puma Melns',                colorway:'La France',       brand:'Puma',        price:5559, img:'images/puma melons lafrance.png' },
  { name:'Travis x Fragment High',    colorway:'Fragment',        brand:'Jordan',      price:5559, img:'images/travis x fragment high.png' },
  { name:'New Balance 990v5',         colorway:'Grey',            brand:'New Balance', price:5559, img:'images/nb 990v5.png' },
  { name:'Air Jordan 4 Retro',        colorway:'Breds',           brand:'Jordan',      price:5559, img:'images/aj4 bred.png' },
  { name:'Salehe Bembury x Crocs',    colorway:'Horchata',        brand:'Crocs',       price:5559, img:'images/crocs horchata.png' },
];

const overlay      = document.getElementById("search-overlay");
const searchInput  = document.getElementById("search-input");
const clearBtn     = document.getElementById("search-clear-btn");
const resultsPanel = document.getElementById("search-results-panel");

function openSearch() { overlay.classList.add("open"); setTimeout(() => searchInput.focus(), 50); }
function closeSearch() {
  overlay.classList.remove("open");
  searchInput.value = ""; clearBtn.classList.remove("visible");
  resultsPanel.innerHTML = ""; resultsPanel.classList.remove("has-results");
}

document.getElementById("search-open-btn").addEventListener("click", openSearch);
document.getElementById("search-open-btn-mobile")?.addEventListener("click", () => {
  document.getElementById("mobile-menu").classList.remove("open"); openSearch();
});
overlay.addEventListener("click", e => { if (e.target === overlay) closeSearch(); });
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeSearch();
  if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); openSearch(); }
});
clearBtn.addEventListener("click", () => {
  searchInput.value = ""; clearBtn.classList.remove("visible");
  resultsPanel.innerHTML = ""; resultsPanel.classList.remove("has-results"); searchInput.focus();
});

function highlight(text, q) {
  if (!q) return escH(text);
  return escH(text).replace(new RegExp(`(${escReg(q)})`,"gi"),'<span class="search-highlight">$1</span>');
}

function runSearch(query) {
  clearBtn.classList.toggle("visible", query.length > 0);
  if (!query.trim()) { resultsPanel.innerHTML = ""; resultsPanel.classList.remove("has-results"); return; }
  const q = query.toLowerCase();
  const hits = PRODUCT_INDEX.filter(p =>
    p.name.toLowerCase().includes(q) || p.colorway.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q)
  );
  resultsPanel.classList.add("has-results");
  if (!hits.length) {
    resultsPanel.innerHTML = `<div class="search-no-results"><span class="emoji">👟</span>No sneakers found for "<strong>${escH(query)}</strong>"</div>`;
    return;
  }
  resultsPanel.innerHTML = hits.map((p,i) => `
    <div class="search-result-item" data-idx="${i}" role="option" tabindex="0" style="animation-delay:${i*40}ms">
      <img class="sri-img" src="${escH(p.img)}" alt="${escH(p.name)}" onerror="this.src='https://via.placeholder.com/52'" />
      <div class="sri-info">
        <div class="sri-name">${highlight(p.name,query)}</div>
        <div class="sri-sub">${highlight(p.colorway,query)} · ${highlight(p.brand,query)}</div>
      </div>
      <div class="sri-price">₹${p.price.toLocaleString("en-IN")}</div>
    </div>`).join("");
  resultsPanel.querySelectorAll(".search-result-item").forEach((item,i) => {
    item.addEventListener("click", () => { closeSearch(); window.location.href = "product.html"; });
    item.addEventListener("keydown", e => { if (e.key === "Enter") item.click(); });
  });
}

let dbt;
searchInput.addEventListener("input", () => { clearTimeout(dbt); dbt = setTimeout(() => runSearch(searchInput.value), 160); });
</script>
